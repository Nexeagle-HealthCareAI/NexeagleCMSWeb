# ═══════════════════════════════════════════════════════════════════════════════
# CMS WEB — CI/CD Pipeline  (React/Vite SPA → nginx container on GHCR)
# ═══════════════════════════════════════════════════════════════════════════════
#
#   Stage 1 — Build       npm ci + vite build (validation)
#   Stage 2 — Deploy Dev  build image (VITE_API_URL = Dev API) → Dev VM  :83  (develop)
#   Stage 3 — Deploy Prod build image (VITE_API_URL = Prod API) → Prod VM :83 (main)
#
# ─────────────────────────────────────────────────────────────────────────────
# SECRETS:
#   DEV_SSH_HOST      151.185.45.77
#   DEV_SSH_USER      root
#   DEV_SSH_PASSWORD  Dev VM root password
#   PROD_SSH_HOST     151.185.45.67
#   PROD_SSH_USER     root
#   PROD_SSH_KEY_B64  base64-encoded SSH private key for Prod App VM
# OPTIONAL VARIABLES (Settings → Variables) to override the API URL:
#   DEV_API_URL       default http://151.185.45.77:5002/api/v1
#   PROD_API_URL      default http://151.185.45.67:5002/api/v1
# ═══════════════════════════════════════════════════════════════════════════════

name: CMS Web — CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: cms-web-cicd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
# ═══════════════════════════════════════════════════════════════════════════════
  build:
    name: "Stage 1 — Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build (validation)
        run: npm run build
        env:
          VITE_API_URL: http://localhost:5002/api/v1

# ═══════════════════════════════════════════════════════════════════════════════
  deploy-dev:
    name: "Stage 2 — Deploy → Dev"
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment: development

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image vars
        id: vars
        run: |
          echo "image=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/cms-web" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            VITE_API_URL=${{ vars.DEV_API_URL || 'http://151.185.45.77:5002/api/v1' }}
          tags: |
            ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}
            ${{ steps.vars.outputs.image }}:develop
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Dev VM
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE: ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}
          PULL_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.DEV_SSH_HOST }}
          username: ${{ secrets.DEV_SSH_USER }}
          password: ${{ secrets.DEV_SSH_PASSWORD }}
          port: 22
          command_timeout: 10m
          envs: IMAGE,PULL_TOKEN,ACTOR
          script: |
            set -e
            echo "$PULL_TOKEN" | docker login ghcr.io -u "$ACTOR" --password-stdin
            docker pull "$IMAGE"
            docker rm -f cms-web-dev 2>/dev/null || true
            docker run -d --name cms-web-dev --restart unless-stopped \
              -p 83:80 "$IMAGE"
            docker image prune -f || true

      - name: Health check
        run: |
          sleep 5
          for i in 1 2 3 4 5; do
            S=$(curl -s -o /dev/null -w '%{http_code}' \
                http://${{ secrets.DEV_SSH_HOST }}:83 2>/dev/null || echo 000)
            echo "Attempt $i — HTTP $S"
            [ "$S" = "200" ] && echo "✅ CMS Web Dev is up" && exit 0
            sleep 5
          done
          echo "⚠️ Health check inconclusive — check: docker logs cms-web-dev"
          exit 0

# ═══════════════════════════════════════════════════════════════════════════════
  deploy-prod:
    name: "Stage 3 — Deploy → Prod"
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image vars
        id: vars
        run: |
          echo "image=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/cms-web" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            VITE_API_URL=${{ vars.PROD_API_URL || 'http://151.185.45.67:5002/api/v1' }}
          tags: |
            ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}
            ${{ steps.vars.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare SSH key
        run: |
          echo "${{ secrets.PROD_SSH_KEY_B64 }}" | base64 -d > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Deploy to Prod VM
        env:
          IMAGE: ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}
          PULL_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
        run: |
          IMAGE_LC=$(printf '%s' "$IMAGE" | tr '[:upper:]' '[:lower:]')
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              ${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }} \
              "set -e; \
               echo '$PULL_TOKEN' | docker login ghcr.io -u '$ACTOR' --password-stdin; \
               docker pull '$IMAGE_LC'; \
               docker rm -f cms-web-prod 2>/dev/null || true; \
               docker run -d --name cms-web-prod --restart unless-stopped \
                 -p 83:80 '$IMAGE_LC'; \
               docker image prune -f || true"

      - name: Health check
        run: |
          sleep 5
          for i in 1 2 3 4 5; do
            S=$(curl -s -o /dev/null -w '%{http_code}' \
                http://${{ secrets.PROD_SSH_HOST }}:83 2>/dev/null || echo 000)
            echo "Attempt $i — HTTP $S"
            [ "$S" = "200" ] && echo "✅ CMS Web Prod is up" && exit 0
            sleep 5
          done
          echo "⚠️ Health check inconclusive — check: docker logs cms-web-prod"
          exit 0

      - name: Write summary
        if: always()
        run: |
          echo "## 🌐 CMS Web — Prod" >> $GITHUB_STEP_SUMMARY
          [ "${{ job.status }}" = "success" ] \
            && echo "**Status:** ✅ Live at http://${{ secrets.PROD_SSH_HOST }}:83" >> $GITHUB_STEP_SUMMARY \
            || echo "**Status:** ❌ Failed" >> $GITHUB_STEP_SUMMARY
